{% extends 'base.html' %}

{% block title %}Company Profile | {{ PORTAL_NAME }}{% endblock %}

{% block content %}
<div class="section-card p-4 p-md-5">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
        <div>
            <h1 class="h2 mb-1">{{ object.name }}</h1>
            <p class="text-muted">{{ object.location }}</p>
        </div>
        <a href="{% url 'company_edit' %}" class="btn btn-primary">Edit company</a>
    </div>
    <p class="mt-3">{{ object.description }}</p>
    {% if object.website %}<p><a href="{{ object.website }}" target="_blank" rel="noreferrer">{{ object.website }}</a></p>{% endif %}
</div>
{% endblock %}
